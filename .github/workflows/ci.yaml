name: CI
on:
  push:
  workflow_dispatch:

# Limit the permissions of the GITHUB_TOKEN
permissions:
  contents: read

jobs:
  # Setup job: Install dependencies and cache them for parallel jobs
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Generate cache key
        id: cache-key
        run: echo "key=node-modules-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  # Build job: Build the project and cache artifacts
  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Cache build artifacts
        id: cache-build
        uses: actions/cache@v5
        with:
          path: dist
          key: build-${{ github.sha }}

      - name: Generate i18n translations
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npm run i18n:generate

      - name: Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: npx vite build

  # Lint job: Run ESLint (parallel with other checks)
  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Lint
        run: npm run lint:check

  # Format job: Run Prettier check (parallel with other checks)
  format:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Format check
        run: npm run format:check

  # TypeScript job: Run type checking (parallel with other checks)
  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: TypeScript check
        run: npm run tsc

  # Endpoint inventory job: Verify derived inventory is up to date (parallel with other checks)
  endpoints:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Verify endpoint inventory
        run: npm run endpoints:verify

  # Storybook build job: validates all stories compile and index successfully
  storybook-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Build Storybook
        run: npm run build-storybook

  # SDK app build job: validates the dev app's vite config and entry compile
  sdk-app-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Build SDK app
        run: npm run sdk-app:build

  # Test job: Run tests with coverage (parallel with other checks)
  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Test with coverage
        run: npm run test:ci

  # Scenarios job: Validate scenario JSON against schema and run scenario unit tests.
  # E2E jobs depend on this so a broken scenario fails fast (cheap) before Playwright runs (expensive).
  scenarios:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Validate scenario JSON
        run: npm run scenarios:validate

      - name: Run scenario unit tests
        run: npm run test:scenarios


  # E2E job: Run Playwright e2e tests against the live demo environment.
  # This is the sole Playwright gate. A previous MSW-mode e2e job was removed
  # because its mock fixtures could not keep pace with real demo backend
  # behavior, and the duplicate run added CI minutes for shallow coverage
  # already provided by Storybook + unit tests. This job exercises the
  # actual API contract, scenario provisioning, and state machine terminal
  # states. The local npm script is still named test:e2e:demo to reflect
  # what it points at.
  #
  # Sharded by domain so each domain runs in parallel and one domain's
  # failure doesn't block feedback on the others. The `domain` filter is a
  # Playwright path-substring match, so it picks up both flat specs at
  # `e2e/tests/<domain>*.spec.ts` and nested specs at
  # `e2e/tests/<domain>/**/*.spec.ts`.
  #
  # Each shard provisions its own demo companies via globalSetup, with no
  # shared state caching. While this means more provisioning load, it avoids
  # stale cache issues and keeps each shard independent.
  e2e:
    needs: [setup, scenarios]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Throttle concurrent shards to avoid overwhelming flows.gusto-demo.com
      # with per-test scenario provisioning. globalSetup is now shared via
      # the e2e-setup job's artifact, but scenario-backed specs still create
      # additional demo companies on demand. 2 concurrent shards keeps that
      # load manageable.
      max-parallel: 2
      matrix:
        domain:
          - company
          - contractor
          - dismissal
          - employee
          - information-requests
          - payroll
          - termination
          - time-off
          - legacy
    name: e2e (${{ matrix.domain }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e tests
        env:
          E2E_USE_REAL_BACKEND: 'true'
        run: npm run test:e2e:demo -- --pass-with-no-tests ${{ matrix.domain }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.domain }}
          path: playwright-report/
          retention-days: 7

      - name: Upload scenario reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: e2e-scenario-report-${{ matrix.domain }}
          path: e2e/reports/
          retention-days: 7

name: Verify GitHub-Hosted Runner Push
# Temporary smoke test for PR #2150 — confirms an ubuntu-latest runner can
# push refs to this repo (i.e. is not blocked by org-level IP allowlisting).
# Mirrors the tag-push step in publish.yaml. Tag is uniquely scoped to the
# run id and is deleted at the end. This workflow file will be removed
# before the PR merges.
on:
  workflow_dispatch:
  push:
    branches:
      - ci/move-public-jobs-to-github-runners
    paths:
      - '.github/workflows/verify-runner-push.yaml'
jobs:
  verify-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create and push test tag
        id: push
        run: |
          TAG="runner-verify-${{ github.run_id }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Verifying ubuntu-latest can push to origin"
          git push origin "$TAG"
          echo "Pushed $TAG"
      - name: Clean up test tag
        if: always() && steps.push.outputs.tag != ''
        run: git push origin --delete "${{ steps.push.outputs.tag }}" || echo "No remote tag to delete"

name: Publish Docs

# Fires after a successful NPM publish on main. Builds the Docusaurus site
# from docs/ + docs-site/ and pushes the built output to the main branch of
# Gusto/embedded-sdk-docs, which serves what's on main.
#
# Auth: a GitHub App installed on Gusto/embedded-sdk-docs with
# Contents: write. Credentials live in this repo's `publish-docs`
# environment as DOCS_APP_ID and DOCS_APP_PRIVATE_KEY.
#
# To activate:
#   1. Install the cross-repo publishing GitHub App on
#      Gusto/embedded-sdk-docs with Contents: write.
#   2. In the `publish-docs` environment on this repo, add secrets
#      DOCS_APP_ID and DOCS_APP_PRIVATE_KEY (paste the entire .pem
#      contents for the private key).
#   3. Once a manual workflow_dispatch run is green, set repo variable
#      DOCS_PUBLISH_ENABLED=true to turn on auto-publish on release.
#
# Manual `workflow_dispatch` triggers fire any time (the gate below only
# guards the auto-on-release path), so the pipeline can be exercised
# end-to-end before flipping the variable.

on:
  # ============================================================
  # TEMP — REMOVE BEFORE MERGE
  # Branch-scoped push trigger lets the App-token + push-to-docs
  # flow be exercised before this workflow ever lives on main.
  # The matching `github.event_name == 'push'` allowance in the
  # job's `if:` below also needs to go. The PR is held in Draft
  # state as the actual merge-blocker.
  # ============================================================
  push:
    branches: [jeff/docs-publishing-pipeline]
  workflow_run:
    workflows: [Publish to NPM]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-docs
  cancel-in-progress: false

jobs:
  publish:
    # workflow_dispatch always allowed (for manual testing). workflow_run
    # only fires when DOCS_PUBLISH_ENABLED=true, so the next NPM release
    # won't auto-publish docs until that variable is explicitly set.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (vars.DOCS_PUBLISH_ENABLED == 'true' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on:
      group: gusto-ubuntu-default
    environment: publish-docs
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Read SDK version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Mint GitHub App token for docs repo
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DOCS_APP_ID }}
          private-key: ${{ secrets.DOCS_APP_PRIVATE_KEY }}
          owner: Gusto
          repositories: embedded-sdk-docs

      - name: Push built site to embedded-sdk-docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ steps.app-token.outputs.token }}
          external_repository: Gusto/embedded-sdk-docs
          publish_branch: main
          publish_dir: ./docs-site/build
          # Each publish replaces main with a fresh orphan commit. The docs
          # repo is a render target; we never want to merge against its
          # history, just overwrite it with the latest build.
          force_orphan: true
          commit_message: "docs: publish SDK ${{ steps.version.outputs.version }}"
          user_name: gusto-embedded-docs[bot]
          user_email: gusto-embedded-docs[bot]@users.noreply.github.com
